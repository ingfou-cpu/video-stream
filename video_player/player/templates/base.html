<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Video Stream Player{% endblock %}</title>
    <!-- Google Fonts: Devoxx-style typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Rajdhani:wght@500;600;700&family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Devoxx France Brand Colors */
            --devoxx-yellow: #E7B127;
            --devoxx-orange: #EA7E14;
            --devoxx-green: #609689;
            --devoxx-alt-green: #9BC1B8;
            --devoxx-dark-green: #304936;
            --devoxx-pink: #FDC7CF;
            --devoxx-cyan: #DAE3F3;
            --devoxx-alt-yellow: #FFD966;

            /* Derived */
            --devoxx-gradient: linear-gradient(135deg, #E7B127, #EA7E14);
            --devoxx-gradient-subtle: linear-gradient(135deg, rgba(231, 177, 39, 0.15), rgba(234, 126, 20, 0.08));
            --devoxx-bg-dark: #1a1f2e;
            --devoxx-bg-card: rgba(255, 255, 255, 0.06);
            --devoxx-bg-card-hover: rgba(255, 255, 255, 0.09);
            --devoxx-border: rgba(255, 255, 255, 0.1);
            --devoxx-border-accent: rgba(231, 177, 39, 0.3);
            --devoxx-text: #FFFFFF;
            --devoxx-text-muted: rgba(255, 255, 255, 0.55);
            --devoxx-text-dim: rgba(255, 255, 255, 0.35);
            --devoxx-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            --devoxx-radius: 16px;
            --devoxx-radius-sm: 10px;
            --devoxx-radius-xs: 6px;
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Open Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            background: linear-gradient(160deg, #0d1117 0%, #1a1f2e 30%, #1f2838 60%, #304936 100%);
            color: var(--devoxx-text);
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
        }

        /* Subtle Devoxx decorative elements */
        body::before {
            content: '';
            position: fixed;
            top: -200px;
            right: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(231, 177, 39, 0.06) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -300px;
            left: -200px;
            width: 700px;
            height: 700px;
            background: radial-gradient(circle, rgba(234, 126, 20, 0.04) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 920px;
            width: 100%;
            background: var(--devoxx-bg-card);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--devoxx-border);
            border-top: 2px solid var(--devoxx-yellow);
            border-radius: var(--devoxx-radius);
            padding: 40px;
            box-shadow: var(--devoxx-shadow);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            position: relative;
            z-index: 1;
        }

        .container:hover {
            box-shadow: 0 30px 60px -12px rgba(0, 0, 0, 0.6);
        }

        h1 {
            font-family: 'Orbitron', monospace;
            font-size: 1.7rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 6px;
            background: var(--devoxx-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .subtitle {
            font-family: 'Rajdhani', sans-serif;
            font-weight: 500;
            text-align: center;
            color: var(--devoxx-text-muted);
            font-size: 1.05rem;
            letter-spacing: 0.5px;
            margin-bottom: 32px;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--devoxx-bg-dark);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--devoxx-yellow);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--devoxx-orange);
        }

        /* Selection styling */
        ::selection {
            background: rgba(231, 177, 39, 0.3);
            color: #fff;
        }
    </style>
    {% block extra_styles %}{% endblock %}
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
