<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Video Stream Player{% endblock %}</title>

    <!-- PWA Meta Tags -->
    <meta name="application-name" content="Video Stream Player">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Video Player">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#EA7E14">
    <link rel="manifest" href="/manifest.json">
    <link rel="apple-touch-icon" href="/static/player/icons/icon-192.svg">

    <!-- Google Fonts: Devoxx France official typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/player/css/style.css">
    <style>
        :root {
            /* Devoxx France 2026 Official Theme Colors */
            --dvx-primary: #EA7E14;
            --dvx-primary-dark: #D06A00;
            --dvx-primary-light: #FF9A3D;
            --dvx-secondary: #609689;
            --dvx-accent: #9DC7BB;
            --dvx-text: #304936;
            --dvx-text-dark: #1A2E24;
            --dvx-text-light: #609689;
            --dvx-bg-dark: #0D0D0D;
            --dvx-bg-card: #1A1A1A;
            --dvx-bg-card-hover: #242424;
            --dvx-bg-mint: #C9E6DE;
            --dvx-bg-teal: #609689;
            --dvx-bg-muted: #9DC7BB;
            --dvx-border: #333333;
            --dvx-border-light: #483535;
            --dvx-red: #E53E3E;
            --dvx-blue: #3182CE;
            --dvx-link: #EA7E14;
            --dvx-link-hover: #FF9A3D;

            /* Legacy aliases */
            --fb-green: #EA7E14;
            --fb-green-dark: #D06A00;
            --fb-green-light: #FF9A3D;
            --fb-green-bg: rgba(234, 126, 20, 0.08);
            --fb-green-border: rgba(234, 126, 20, 0.25);
            --fb-orange: #EA7E14;
            --fb-red: #E53E3E;
            --fb-blue: #3182CE;

            --devoxx-yellow: #EA7E14;
            --devoxx-orange: #FFB062;
            --devoxx-green: #609689;
            --devoxx-alt-green: #9DC7BB;
            --devoxx-dark-green: #304936;
            --devoxx-pink: #FC8181;
            --devoxx-cyan: #63B3ED;

            --devoxx-gradient: linear-gradient(135deg, #EA7E14, #D06A00);
            --devoxx-gradient-subtle: linear-gradient(135deg, rgba(234, 126, 20, 0.12), rgba(208, 106, 0, 0.06));
            --devoxx-bg-dark: #0D0D0D;
            --devoxx-bg-card: #1A1A1A;
            --devoxx-bg-card-hover: #242424;
            --devoxx-border: #333333;
            --devoxx-border-accent: rgba(234, 126, 20, 0.3);
            --devoxx-text: #304936;
            --devoxx-text-muted: #609689;
            --devoxx-text-dim: #9DC7BB;
            --devoxx-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2), 0 2px 4px -1px rgba(0, 0, 0, 0.1);
            --devoxx-radius: 12px;
            --devoxx-radius-sm: 8px;
            --devoxx-radius-xs: 4px;
        }

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Open Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            background: var(--dvx-bg-dark);
            color: #FFFFFF;
            display: flex;
            flex-direction: row;
            justify-content: flex-start;
            align-items: stretch;
            padding: 0;
            position: relative;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        a { color: var(--dvx-link); transition-property: color; transition-duration: 0.2s; transition-timing-function: ease; }
        a:hover { color: var(--dvx-link-hover); text-decoration: underline; }

        .app-layout {
            display: flex;
            flex-direction: row;
            width: 100%;
            min-height: 100vh;
            position: relative;
            z-index: 2;
        }

        .sidebar {
            width: 380px;
            min-width: 380px;
            background: rgba(26, 26, 26, 0.7);
            border-right: 1px solid rgba(255, 255, 255, 0.06);
            padding: 20px 16px;
            overflow-y: auto;
            height: 100vh;
            position: sticky;
            top: 0;
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .sidebar h2 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--dvx-primary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 4px;
        }

        .sidebar-search {
            display: flex;
            gap: 8px;
        }

        .search-input-wrap {
            flex: 1;
            position: relative;
            display: flex;
        }

        .search-input-wrap input {
            width: 100%;
            padding: 10px 36px 10px 12px;
            background: rgba(13, 13, 13, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--devoxx-radius-xs);
            color: #FFFFFF;
            font-family: 'Open Sans', sans-serif;
            font-size: 0.85rem;
            outline: none;
            transition-property: border-color, background, box-shadow;
            transition-duration: 0.3s;
            transition-timing-function: ease;
        }

        .search-input-wrap input::placeholder { color: var(--dvx-text-dim); }
        .search-input-wrap input:focus {
            border-color: var(--dvx-primary);
            box-shadow: 0 0 0 3px rgba(234, 126, 20, 0.15);
        }

        .sidebar-search button {
            padding: 10px 16px;
            background: var(--dvx-primary);
            color: #FFFFFF;
            border: none;
            border-radius: var(--devoxx-radius-xs);
            cursor: pointer;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition-property: background, transform;
            transition-duration: 0.2s;
            transition-timing-function: ease;
            white-space: nowrap;
        }

        .sidebar-search button:active {
            transform: scale(0.96);
        }

        .sidebar-search button:hover {
            background: var(--dvx-primary-dark);
        }

        /* Filter button inside input */
        .sidebar-search .btn-filter {
            position: absolute;
            right: 4px;
            top: 50%;
            transform: translateY(-50%);
            padding: 4px 8px;
            background: none !important;
            border: none;
            border-radius: var(--devoxx-radius-xs);
            color: var(--dvx-text-light);
            cursor: pointer;
            font-size: 1rem;
            line-height: 1;
            transition-property: color;
            transition-duration: 0.2s;
            transition-timing-function: ease;
            min-width: 32px;
            min-height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .sidebar-search .btn-filter:hover {
            background: none !important;
            color: var(--dvx-primary);
        }

        .sidebar-search .btn-filter.active {
            background: none !important;
            color: var(--dvx-primary);
        }

        /* Filter flyout */
        .filter-flyout {
            position: relative;
        }

        .filter-dropdown {
            display: none;
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            right: 0;
            z-index: 100;
            background: rgba(26, 26, 26, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--devoxx-radius-sm);
            padding: 12px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            animation: fadeIn 0.15s ease;
        }

        .filter-dropdown.visible {
            display: block;
        }

        .filter-dropdown select {
            width: 100%;
            padding: 8px 10px;
            background: rgba(13, 13, 13, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: var(--devoxx-radius-xs);
            color: #FFFFFF;
            font-family: 'Open Sans', sans-serif;
            font-size: 0.8rem;
            cursor: pointer;
            outline: none;
            transition-property: border-color, box-shadow;
            transition-duration: 0.2s;
            transition-timing-function: ease;
            appearance: auto;
            margin-bottom: 8px;
        }

        .filter-dropdown select:last-child {
            margin-bottom: 0;
        }

        .filter-dropdown select:hover {
            border-color: var(--dvx-border-light);
        }

        .filter-dropdown select:focus {
            border-color: var(--dvx-primary);
            box-shadow: 0 0 0 2px rgba(234, 126, 20, 0.15);
        }

        .filter-dropdown select option {
            background: rgba(13, 13, 13, 0.85);
            color: #FFFFFF;
        }

        .filter-dropdown .filter-label {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--dvx-primary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 4px;
            display: block;
        }

        .sidebar-results {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sidebar-result {
            display: flex;
            gap: 10px;
            padding: 10px;
            background: rgba(26, 26, 26, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: var(--devoxx-radius-sm);
            cursor: pointer;
            transition-property: background, border-color, box-shadow, transform;
            transition-duration: 0.2s;
            transition-timing-function: ease;
        }

        .sidebar-result:hover {
            background: rgba(26, 26, 26, 0.15);
            border-color: rgba(255, 255, 255, 0.08);
            box-shadow: var(--devoxx-shadow);
            transform: translateX(2px);
        }

        .sidebar-result:active {
            transform: scale(0.98) translateX(1px);
        }

        .sidebar-result img {
            width: 80px;
            height: 45px;
            object-fit: cover;
            border-radius: 4px;
            flex-shrink: 0;
            background: var(--dvx-border-light);
            outline: 1px solid rgba(255, 255, 255, 0.1);
            outline-offset: -1px;
        }

        .sidebar-result .result-info {
            flex: 1;
            min-width: 0;
        }

        .sidebar-result .result-title {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.8rem;
            font-weight: 600;
            color: #FFFFFF;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .sidebar-result .result-channel {
            font-size: 0.7rem;
            color: var(--dvx-text-light);
            margin-top: 4px;
        }

        .sidebar-result .result-meta {
            font-size: 0.65rem;
            color: var(--dvx-text-dim);
            margin-top: 2px;
        }

        .sidebar-status {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.8rem;
            color: var(--dvx-text-light);
            text-align: center;
            padding: 20px 0;
        }

        .sidebar-status.error {
            color: var(--dvx-red);
        }

        .sidebar-status.loading {
            animation: pulse 1.2s ease-in-out infinite;
        }

        /* Right sidebar - history */
        .sidebar-right {
            width: 340px;
            min-width: 340px;
            background: rgba(26, 26, 26, 0.7);
            border-left: 1px solid rgba(255, 255, 255, 0.06);
            padding: 20px 16px;
            overflow-y: auto;
            height: 100vh;
            position: sticky;
            top: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .sidebar-right .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .sidebar-right h2 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--dvx-primary);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin: 0;
        }

        .btn-clear {
            padding: 6px 12px;
            background: transparent;
            color: var(--dvx-text-light);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: var(--devoxx-radius-xs);
            cursor: pointer;
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition-property: background, border-color, color, transform;
            transition-duration: 0.2s;
            transition-timing-function: ease;
            white-space: nowrap;
        }

        .btn-clear:hover {
            background: rgba(229, 62, 62, 0.1);
            border-color: var(--dvx-red);
            color: var(--dvx-red);
        }

        .btn-clear:active {
            transform: scale(0.96);
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .history-item {
            display: flex;
            gap: 10px;
            padding: 8px;
            background: rgba(26, 26, 26, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: var(--devoxx-radius-sm);
            cursor: pointer;
            transition-property: background, border-color, box-shadow, transform;
            transition-duration: 0.2s;
            transition-timing-function: ease;
        }

        .history-item:hover {
            background: rgba(26, 26, 26, 0.12);
            border-color: rgba(255, 255, 255, 0.06);
            box-shadow: var(--devoxx-shadow);
            transform: translateX(-2px);
        }

        .history-item:active {
            transform: scale(0.98) translateX(-1px);
        }

        .history-item img {
            width: 72px;
            height: 40px;
            object-fit: cover;
            border-radius: 4px;
            flex-shrink: 0;
            background: var(--dvx-border-light);
            outline: 1px solid rgba(255, 255, 255, 0.1);
            outline-offset: -1px;
        }

        .history-item .result-info {
            flex: 1;
            min-width: 0;
        }

        .history-item .result-title {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            color: #FFFFFF;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .history-item .result-meta {
            font-size: 0.65rem;
            color: var(--dvx-text-dim);
            margin-top: 2px;
        }

        .history-empty {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 0.8rem;
            color: var(--dvx-text-light);
            text-align: center;
            padding: 24px 0;
        }

        .container {
            flex: 1;
            max-width: 1200px;
            min-height: 100vh;
            background: rgba(13, 13, 13, 0.55);
            border: none;
            border-top: 3px solid var(--dvx-primary);
            border-radius: 0;
            padding: 24px 28px;
            box-shadow: none;
            transition: background 0.3s ease;
            position: relative;
            margin: 0 auto;
        }

        .container:hover {
            background: rgba(26, 26, 26, 0.08);
            box-shadow: none;
        }

        h1 {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 2px;
            color: var(--dvx-primary);
            letter-spacing: 0.5px;
            text-transform: uppercase;
            -webkit-text-fill-color: var(--fb-green);
            background: none;
            text-wrap: balance;
        }

        .subtitle {
            font-family: 'Open Sans', sans-serif;
            font-weight: 400;
            text-align: center;
            color: var(--devoxx-text-muted);
            font-size: 0.9rem;
            letter-spacing: 0.3px;
            margin-bottom: 32px;
        }

        /* Tabular numbers for dynamic values */
        .tabular-nums {
            font-variant-numeric: tabular-nums;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: var(--dvx-bg-dark);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--dvx-primary);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--dvx-primary-dark);
        }

        /* Selection styling */
        ::selection {
            background: rgba(234, 126, 20, 0.3);
            color: #FFFFFF;
        }

        /* Keyframes used by elements in base.html */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        @media (max-width: 768px) {
            .container {
                background: rgba(13, 13, 13, 0.7);
            }
        }
    </style>
    {% block extra_styles %}{% endblock %}
</head>
<body>
    <!-- Background Image -->
    <div id="bgImage"
        style="position:fixed;inset:0;width:100%;height:100%;background:url('/static/player/backgrounds/snowy-mountains-dolomiten-reflected-lake.jpg') center/cover no-repeat;z-index:0;pointer-events:none;"></div>
    <!-- Subtle dark overlay to help text readability -->
    <div style="position:fixed;inset:0;z-index:1;pointer-events:none;background:rgba(0,0,0,0.25);"></div>
    <div class="app-layout">
        <aside class="sidebar" id="sidebar">
            <h2>&#9654; Recherche YouTube</h2>
            <div class="sidebar-search">
                <div class="search-input-wrap">
                    <input type="text" id="ytSearchInput" placeholder="Rechercher..." 
                           onkeydown="if(event.key==='Enter') ytSearch()">
                    <button class="btn-filter" id="btnFilter" onclick="toggleFilters()" title="Filtres">&#9776;</button>
                </div>
                <button onclick="ytSearch()">Chercher</button>
            </div>
            <div class="filter-flyout">
                <div class="filter-dropdown" id="filterDropdown">
                    <span class="filter-label">Trier par</span>
                    <select id="filterSort" onchange="ytSearch()">
                        <option value="relevance">Pertinence</option>
                        <option value="date">Date</option>
                        <option value="views">Vues</option>
                        <option value="rating">Note</option>
                    </select>
                    <span class="filter-label">Duree</span>
                    <select id="filterDuration" onchange="ytSearch()">
                        <option value="all">Toute duree</option>
                        <option value="short">Courte (&lt;4min)</option>
                        <option value="medium">Moyenne (4-20min)</option>
                        <option value="long">Longue (&gt;20min)</option>
                    </select>
                    <span class="filter-label">Date</span>
                    <select id="filterDate" onchange="ytSearch()">
                        <option value="all">Toute date</option>
                        <option value="today">Aujourd'hui</option>
                        <option value="week">Cette semaine</option>
                        <option value="month">Ce mois</option>
                        <option value="year">Cette année</option>
                    </select>
                </div>
            </div>
            <div class="sidebar-results" id="ytResults">
                <div class="sidebar-status">Entrez un terme de recherche</div>
            </div>
        </aside>
        <div class="container" id="mainContent">
            {% block content %}{% endblock %}
        </div>
        <aside class="sidebar-right" id="sidebarRight">
            <div class="header">
                <h2>&#9201; Historique</h2>
                <button class="btn-clear" id="clearHistory" onclick="clearHistory()">Effacer</button>
            </div>
            <div class="history-list" id="historyList">
                <div class="history-empty">Aucune video visionnee</div>
            </div>
        </aside>
    </div>

    <!-- Decorative top bar - Devoxx France style -->
    <div style="
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 4px;
        background: linear-gradient(90deg, #EA7E14, #FF9A3D, #609689);
        z-index: 9999;
        pointer-events: none;
    "></div>

    <!-- PWA Service Worker Registration -->
    <script>
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(function(reg) {
                console.log('PWA: Service Worker enregistre (scope: ' + reg.scope + ')');
            })
            .catch(function(err) {
                console.warn('PWA: Echec enregistrement Service Worker', err);
            });
    }

    // Filter dropdown toggle
    function toggleFilters() {
        var dd = document.getElementById('filterDropdown');
        var btn = document.getElementById('btnFilter');
        dd.classList.toggle('visible');
        btn.classList.toggle('active');
    }

    // Close filter dropdown on click outside
    document.addEventListener('click', function(e) {
        var dd = document.getElementById('filterDropdown');
        var btn = document.getElementById('btnFilter');
        if (dd && btn && !dd.contains(e.target) && !btn.contains(e.target)) {
            dd.classList.remove('visible');
            btn.classList.remove('active');
        }
    });

    // YouTube search functionality
    function ytSearch() {
        var input = document.getElementById('ytSearchInput');
        var results = document.getElementById('ytResults');
        var query = input.value.trim();
        if (!query) return;
        var sortVal = document.getElementById('filterSort').value;
        var durVal = document.getElementById('filterDuration').value;
        var dateVal = document.getElementById('filterDate').value;
        results.innerHTML = '<div class="sidebar-status loading">Recherche...</div>';
        fetch('/yt-search/?q=' + encodeURIComponent(query)
            + '&maxResults=12'
            + '&sort=' + sortVal
            + '&duration=' + durVal
            + '&date=' + dateVal)
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.error) {
                    results.innerHTML = '<div class="sidebar-status error">' + data.error + '</div>';
                    return;
                }
                if (!data.results || data.results.length === 0) {
                    results.innerHTML = '<div class="sidebar-status">Aucun resultat</div>';
                    return;
                }
                results.innerHTML = '';
                data.results.forEach(function(video) {
                    var div = document.createElement('div');
                    div.className = 'sidebar-result';
                    div.innerHTML =
                        '<img src="' + video.thumbnail + '" alt="" loading="lazy" onerror="this.src=\'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 120 68%22><rect fill=%22%23edf2f7%22 width=%22120%22 height=%2268%22/></svg>\'">' +
                        '<div class="result-info">' +
                            '<div class="result-title">' + escapeHtml(video.title) + '</div>' +
                            '<div class="result-channel">' + escapeHtml(video.channel || '') + '</div>' +
                            '<div class="result-meta">' + formatDuration(video.duration) + '</div>' +
                        '</div>';
                    div.addEventListener('click', (function(url) {
                        return function() { loadYtResult(url); };
                    })(video.url));
                    results.appendChild(div);
                });
            })
            .catch(function(err) {
                results.innerHTML = '<div class="sidebar-status error">Erreur: ' + err.message + '</div>';
            });
    }

    function loadYtResult(url) {
        var input = document.getElementById('videoUrl');
        var btn = document.getElementById('loadVideo');
        if (input && btn) {
            input.value = url;
            btn.click();
        }
    }

    function escapeHtml(text) {
        if (!text) return '';
        var d = document.createElement('div');
        d.textContent = text;
        return d.innerHTML;
    }

    function formatDuration(seconds) {
        if (!seconds) return '';
        var m = Math.floor(seconds / 60);
        var s = seconds % 60;
        if (m >= 60) {
            var h = Math.floor(m / 60);
            m = m % 60;
            return h + 'h ' + (m < 10 ? '0' : '') + m + 'min';
        }
        return m + 'min ' + (s < 10 ? '0' : '') + s + 's';
    }

    // History functionality
    function addToHistory(url) {
        var history = getHistory();
        history = history.filter(function(item) { return item.url !== url; });
        var label = getUrlLabel(url);
        var thumb = getThumbnailFromUrl(url);
        history.unshift({
            url: url,
            title: label,
            channel: '',
            thumbnail: thumb,
            timestamp: Date.now()
        });
        if (history.length > 50) history = history.slice(0, 50);
        try {
            localStorage.setItem('videoHistory', JSON.stringify(history));
        } catch(e) {}
        renderHistory();
        // Fetch better metadata
        fetch('/download/info/?video_url=' + encodeURIComponent(url))
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (!data.error) {
                    updateHistoryEntry(url, data.title || '', data.channel || '', data.thumbnail_url || '');
                }
            })
            .catch(function() {});
    }

    function getUrlLabel(url) {
        try {
            var yt = url.match(/(?:youtube\.com\/(?:watch\?(?:.*&)?v=|embed\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
            if (yt) return 'YouTube - ' + yt[1];
            return decodeURIComponent(url.split('/').pop()).replace(/[_-]/g, ' ').replace(/\.[^.]+$/, '');
        } catch(e) { return url; }
    }

    function getThumbnailFromUrl(url) {
        var yt = url.match(/(?:youtube\.com\/(?:watch\?(?:.*&)?v=|embed\/)|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
        if (yt) return 'https://i.ytimg.com/vi/' + yt[1] + '/hqdefault.jpg';
        var dm = url.match(/(?:dailymotion\.com\/video\/|dai\.ly\/)([a-zA-Z0-9]+)/);
        if (dm) return 'https://www.dailymotion.com/thumbnail/video/' + dm[1];
        return '';
    }

    function updateHistoryEntry(url, title, channel, thumbnail) {
        var history = getHistory();
        for (var i = 0; i < history.length; i++) {
            if (history[i].url === url) {
                if (title) history[i].title = title;
                if (channel) history[i].channel = channel;
                if (thumbnail) history[i].thumbnail = thumbnail;
                break;
            }
        }
        try {
            localStorage.setItem('videoHistory', JSON.stringify(history));
        } catch(e) {}
        renderHistory();
    }

    function getHistory() {
        try {
            var data = localStorage.getItem('videoHistory');
            return data ? JSON.parse(data) : [];
        } catch(e) {
            return [];
        }
    }

    function renderHistory() {
        var list = document.getElementById('historyList');
        var history = getHistory();
        if (!list) return;
        if (history.length === 0) {
            list.innerHTML = '<div class="history-empty">Aucune video visionnee</div>';
            return;
        }
        list.innerHTML = '';
        history.forEach(function(item) {
            var div = document.createElement('div');
            div.className = 'history-item';
            var thumb = item.thumbnail || '';
            var img = thumb
                ? '<img src="' + thumb + '" alt="" loading="lazy" onerror="this.style.display=\'none\'">'
                : '<img src="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 120 68%22><rect fill=%22%23edf2f7%22 width=%22120%22 height=%2268%22/></svg>" alt="">';
            div.innerHTML = img +
                '<div class="result-info">' +
                    '<div class="result-title">' + escapeHtml(item.title) + '</div>' +
                    '<div class="result-meta">' + escapeHtml(item.channel) + '</div>' +
                '</div>';
            div.addEventListener('click', (function(url) {
                return function() { loadHistoryItem(url); };
            })(item.url));
            list.appendChild(div);
        });
    }

    function loadHistoryItem(url) {
        var input = document.getElementById('videoUrl');
        var btn = document.getElementById('loadVideo');
        if (input && btn) {
            input.value = url;
            btn.click();
        }
    }

    function clearHistory() {
        if (!confirm('Effacer tout l\'historique ?')) return;
        try {
            localStorage.removeItem('videoHistory');
        } catch(e) {}
        renderHistory();
    }

    // Render history on page load
    renderHistory();
    </script>
</body>
</html>
