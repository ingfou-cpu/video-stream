{% extends 'base.html' %}
{% load static i18n %}

{% block content %}
<section style="min-height: 100vh; padding: 8rem 0 5rem; background: var(--eb-gradient-dark); display: flex; align-items: center;">
    <div class="container px-4 px-lg-5 text-center">
        <div style="font-size: 6rem; font-weight: 500; background: linear-gradient(135deg, var(--eb-primary), #4A3F9E); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1; font-family: 'Inter', sans-serif;">404</div>
        <h2 style="color: #fff; font-weight: 500; font-size: 2rem; margin-top: 0.5rem; font-family: 'Inter', sans-serif;">{% trans "Page introuvable" %}</h2>
        <p style="color: var(--ka-shadow); max-width: 400px; margin: 0.5rem auto 2rem;">{% trans "La page que vous cherchez n'existe pas ou a été déplacée." %}</p>
        <a href="{% url 'home' %}" class="btn" style="background: var(--eb-gradient-primary); color: #fff; border: none; border-radius: 9999px; padding: 14px 36px; font-weight: 500; font-family: 'Inter', sans-serif;">
            <i class="fas fa-home me-2"></i>{% trans "Retour à l'accueil" %}
        </a>
    </div>
</section>
{% endblock %}
