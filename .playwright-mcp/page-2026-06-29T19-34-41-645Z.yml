      - 'heading "Voyage a Kairouan : la cite des 100 mosquees" [level=1] [ref=e69]'
      - generic [ref=e70]:
        - paragraph [ref=e71]: Le gouvernorat de Kairouan est une region situee au centre-est de la Tunisie, a l'interieur des terres, reconnue pour ses profondes racines historiques et son importance culturelle.
        - paragraph [ref=e72]: Fondee au VIIe siecle, Kairouan est consideree comme la quatrieme ville sainte de l'Islam apres La Mecque, Medine et Jerusalem. La Grande Mosquee de Kairouan, avec son imposant minaret et ses 414 colonnes de marbre, est l'un des plus anciens et des plus importants monuments islamiques d'Afrique du Nord.
        - paragraph [ref=e73]: Les souks de la medina de Kairouan sont un veritable voyage dans le temps. On y trouve des tapis tisses a la main, de la poterie traditionnelle, des cuivres grave et des pâtisseries locales.
        - paragraph [ref=e74]: Ne manquez pas de visiter le bassin des Aghlabides, impressionnant reservoir d'eau datant du IXe siecle, temoignage du genie hydraulique de l'epoque.
